# config/default_config.toml

[classifier]
system2_threshold = 0.8
always_system2_tools = ["Write"]
entropy_threshold = 0.5
medium_entropy_threshold = 0.3

[sandbox]
default_timeout_seconds = 30
default_memory_limit_mb = 512
network_access = false
max_retry_attempts = 3

[telemetry]
json_dir = "~/.metascaffold/telemetry/"
sqlite_path = "~/.metascaffold/cognitive.db"
log_level = "info"

[notebooklm]
enabled = true
default_notebook = "MetaScaffold_Core"
fallback_on_error = true

[mcp_server]
host = "127.0.0.1"
port = 8787

[llm]
enabled = true
fallback_to_heuristics = true
classifier_model = "gpt-4.1-nano"
evaluator_model = "o3-mini"
planner_model = "gpt-4.1-mini"
distiller_model = "gpt-4.1-nano"
reflector_model = "o3-mini"

[verifier]
run_ast = true
run_ruff = true
run_mypy = false
run_pytest = false
ruff_timeout = 15
mypy_timeout = 30
pytest_timeout = 60

[memory]
prune_threshold = 0.1
stability_hours = 168.0
storage_path = "~/.metascaffold/reflection_memory.json"
